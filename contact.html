<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a website for my portfolio">

    <title>Jada's Portfolio | Contact</title>

    <!-- TailwindCSS Play CDN Link -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <style>
        .reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: all 0.6s ease;
        }

        .reveal.active {
        opacity: 1;
        transform: translateY(0);
        }

        /* stagger delay helpers */

        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }
        .delay-4 { transition-delay: 0.4s; }
    </style>

    <!-- Styles -->
    <!-- <link rel="stylesheet" href="css/reset.css"> -->
    <!-- <link rel="stylesheet" href="css/styles.css"> -->

    <!-- Scripts -->
     <!-- <script src="js/main.js" defer></script> -->

     
</head>
<script>
  function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.classList.toggle("hidden");
  }
</script>
<body class="bg-rose-50 text-black min-h-screen">

  <header class="bg-gray-900">
    <nav class="max-w-7xl mx-auto px-6">
      <div class="flex items-center justify-between h-20">
        <!-- Logo + Name -->
        <div class="flex items-center gap-3">
          <img src="img/jada-lee-hamilton-logo.svg" alt="Jada-Lee Hamilton Logo" class="h-8 w-auto rounded-sm"/>
          <span class="text-xl font-semibold text-white">
          Jada-Lee Hamilton
          </span>
        </div>

        <!-- Desktop Navigation -->
        <div class="hidden sm:flex items-center space-x-4">
          <a href="/" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white transition">
          Home
          </a>

          <a href="about-me.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white transition">
          About Me
          </a>

          <a href="projects.html" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-800 hover:text-white transition">
          Projects
          </a>

          <a href="contact.html" class="px-3 py-2 rounded-md text-sm font-medium text-white bg-gray-800">
          Contact
          </a>
        </div>

        <!-- Mobile Menu Button -->
        <button class="sm:hidden p-2 text-gray-300 hover:text-white hover:bg-gray-800 rounded-md transition"
        onclick="toggleMenu()">
        ☰
        </button>
      </div>

      <!-- Mobile Menu -->
      <div id="mobileMenu" class="hidden sm:hidden flex flex-col space-y-2 pb-4">
        <a href="/" class="block px-3 py-2 rounded-md text-gray-300 hover:bg-gray-800 hover:text-white transition">
        Home
        </a>

        <a href="about-me.html" class="block px-3 py-2 rounded-md text-gray-300 hover:bg-gray-800 hover:text-white transition">
        About Me
        </a>

        <a href="projects.html" class="block px-3 py-2 rounded-md text-gray-300 hover:bg-gray-800 hover:text-white transition">
        Projects
        </a>

        <a href="contact.html" class="block px-3 py-2 rounded-md text-white bg-gray-800">
        Contact
        </a>
      </div>
    </nav>
  </header>
  <main class="p-10 flex flex-col gap-5">
      <div>
          <img src="https://images.pexels.com/photos/7394377/pexels-photo-7394377.jpeg" alt="hero image" class="w-full h-96 object-cover rounded-lg">
      </div>
      <section class="grid md:grid-cols-2 gap-10 items-start">
        <div class="mb-8">
          <h2 class="text-3xl font-bold mb-4">Get in touch</h2>
          <p class="text-gray-600 mb-6">Have a project in mind? I'd love to hear from you.</p>
          <ul class="space-y-2">
            <li>📧Email: <a href="mailto:jadalee.a.hamilton@gmail.com" class="text-rose-500 hover:underline">jadalee.a.hamilton@gmail.com</a></li>
            <li>📱Phone: <a href="tel:+17097636888" class="text-rose-500 hover:underline">+1 (709) 763-6888</a></li>
          </ul>
        </div>
          <div class="bg-gray-400/50 p-8 rounded-2xl shadow-sm border border-gray-100">
              <form action="https://formspree.io/f/xwvareqj" method="POST" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" name="name" id="name" required class="mt-1 block w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 focus:ring-2 focus:ring-pink-800/50 focus:border-transparent outline-none transition duration-200" 
                    placeholder="Jane Doe">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" name="email" id="email" required class="mt-1 block w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 focus:ring-2 focus:ring-pink-800/50 focus:border-transparent outline-none transition duration-200" 
                    placeholder="jane@example.com">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
                    <textarea id="message" name="message" rows="4" required class="mt-1 block w-full px-4 py-3 bg-white border border-gray-300 rounded-lg text-gray-900 focus:ring-2 focus:ring-pink-800/50 focus:border-transparent outline-none transition duration-200" 
                    placeholder="Reason for contacting..."></textarea>
                </div>

                <button type="submit" class="w-full bg-pink-600 text-white font-semibold py-3 px-6 rounded-lg hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-pink-800/50 focus:ring-offset-2 transition duration-200 ease-in-out transform active:scale-[0.98]">
                    Send Message
                </button>
                <input type="hidden" name="_next" value="thank-you.html">
              </form>
          </div>
      </section>
  </main>
  <footer class="bg-gray-900 text-gray-300 mt-16">
    <div class="max-w-7xl mx-auto px-6 py-8 text-center">
      <div class="flex justify-center gap-6 py-4 mt-4">
        <a href="https://github.com/jleehamilton" class="hover:text-white"> GitHub </a> 
        <a href="https://www.linkedin.com/in/jada-lee-hamilton/" class="hover:text-white"> LinkedIn </a>
      </div>
      <p class="text-sm">© 2026 Jada-Lee Hamilton — UI/UX Designer & Developer Portfolio</p>
    </div>
  </footer>
  <!-- AOS JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 800,      // animation speed
      once: true,         // only animate once
      offset: 100         // start slightly before visible
    });
  </script>
</body>
</html>
